<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome | AI Resume Analyzer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #eef2ff, #f8fafc);
            padding: 40px;
        }

        .container {
            max-width: 720px;
            margin: auto;
            background: white;
            padding: 50px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            margin-bottom: 15px;
        }

        .subtitle {
            color: #555;
            margin-bottom: 25px;
        }

        .features {
            margin-top: 25px;
            background: #f1f5f9;
            padding: 20px;
            border-radius: 8px;
            text-align: left;
        }

        .features ul {
            padding-left: 20px;
        }

        .features li {
            margin-bottom: 8px;
        }

        button {
            margin-top: 30px;
            padding: 14px;
            width: 60%;
            background: linear-gradient(90deg, #2563eb, #3b82f6);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }

        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🤖 AI Resume Analyzer</h1>
    <p class="subtitle">
        Smart resume evaluation using AI, ATS scoring, and skill-based insights
    </p>

    <div class="features">
        <h3>🚀 What You Can Do</h3>
        <ul>
            <li>✔ Analyze resume with job description</li>
            <li>✔ Get universal resume feedback</li>
            <li>✔ Check ATS compatibility</li>
            <li>✔ View AI-based scoring & insights</li>
        </ul>
    </div>

    <!-- CTA Button -->
    <a href="/home">
        <button>Get Started</button>
    </a>

</div>

</body>
</html>
